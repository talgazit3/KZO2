name: Simple Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # עדכון לגרסה חדשה יותר
      - uses: actions/setup-node@v4 # עדכון לגרסה חדשה יותר
        with:
          node-version: 20
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: npm install # שימוש מפורש ב-npm
      - name: Build APK
        run: npx eas-cli build -p android --profile preview --non-interactive
